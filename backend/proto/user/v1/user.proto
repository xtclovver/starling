syntax = "proto3";

package user.v1;

option go_package = "github.com/usedcvnt/microtwitter/gen/go/user/v1";

import "common/v1/common.proto";
import "google/protobuf/timestamp.proto";

message User {
  string id = 1;
  string username = 2;
  string email = 3;
  string display_name = 4;
  string bio = 5;
  string avatar_url = 6;
  google.protobuf.Timestamp created_at = 7;
  google.protobuf.Timestamp updated_at = 8;
  int32 followers_count = 9;
  int32 following_count = 10;
  string banner_url = 11;
  bool is_admin = 12;
  bool is_banned = 13;
}

message RegisterRequest {
  string username     = 1;
  string email        = 2;
  string password     = 3;
  string display_name = 4;
  string ua_hash      = 5;
}

message RegisterResponse {
  User user = 1;
  string access_token = 2;
  string refresh_token = 3;
}

message LoginRequest {
  string email    = 1;
  string password = 2;
  string ua_hash  = 3;
}

message LoginResponse {
  User user = 1;
  string access_token = 2;
  string refresh_token = 3;
}

message RefreshTokenRequest {
  string refresh_token = 1;
  string ua_hash       = 2;
}

message RefreshTokenResponse {
  string access_token = 1;
  string refresh_token = 2;
}

message LogoutRequest {
  string access_token = 1;
  string refresh_token = 2;
}

message LogoutResponse {}

message RevokeAllTokensRequest {
  string user_id = 1;
  string access_token = 2;
}

message RevokeAllTokensResponse {}

message GetUserRequest {
  string id = 1;
  string viewer_id = 2;
}

message GetUserResponse {
  User user = 1;
  bool is_following = 2;
}

message UpdateUserRequest {
  string id = 1;
  string display_name = 2;
  string bio = 3;
  string avatar_url = 4;
  string banner_url = 5;
}

message UpdateUserResponse {
  User user = 1;
}

message SoftDeleteUserRequest {
  string id = 1;
}

message SoftDeleteUserResponse {}

message SearchUsersRequest {
  string query = 1;
  common.v1.PaginationRequest pagination = 2;
}

message SearchUsersResponse {
  repeated User users = 1;
  common.v1.PaginationResponse pagination = 2;
}

message GetUsersByIDsRequest {
  repeated string ids = 1;
}

message GetUsersByIDsResponse {
  repeated User users = 1;
}

message FollowRequest {
  string follower_id = 1;
  string following_id = 2;
}

message FollowResponse {}

message UnfollowRequest {
  string follower_id = 1;
  string following_id = 2;
}

message UnfollowResponse {}

message GetFollowersRequest {
  string user_id = 1;
  common.v1.PaginationRequest pagination = 2;
}

message GetFollowersResponse {
  repeated User users = 1;
  common.v1.PaginationResponse pagination = 2;
}

message GetFollowingRequest {
  string user_id = 1;
  common.v1.PaginationRequest pagination = 2;
}

message GetFollowingResponse {
  repeated User users = 1;
  common.v1.PaginationResponse pagination = 2;
}

// Recommended users
message GetRecommendedUsersRequest {
  string user_id = 1;
  int32 limit = 2;
}

message GetRecommendedUsersResponse {
  repeated User users = 1;
}

// Notifications
message Notification {
  string id = 1;
  string user_id = 2;
  string actor_id = 3;
  string type = 4;
  string post_id = 5;
  string comment_id = 6;
  bool read = 7;
  google.protobuf.Timestamp created_at = 8;
  User actor = 9;
}

message CreateNotificationRequest {
  string user_id = 1;
  string actor_id = 2;
  string type = 3;
  string post_id = 4;
  string comment_id = 5;
}

message CreateNotificationResponse {
  Notification notification = 1;
}

message GetNotificationsRequest {
  string user_id = 1;
  common.v1.PaginationRequest pagination = 2;
}

message GetNotificationsResponse {
  repeated Notification notifications = 1;
  common.v1.PaginationResponse pagination = 2;
}

message GetUnreadCountRequest {
  string user_id = 1;
}

message GetUnreadCountResponse {
  int32 count = 1;
}

message MarkReadRequest {
  string id = 1;
  string user_id = 2;
}

message MarkReadResponse {}

message MarkAllReadRequest {
  string user_id = 1;
}

message MarkAllReadResponse {}

message ChangePasswordRequest {
  string user_id = 1;
  string current_password = 2;
  string new_password = 3;
  string access_token = 4;
}

message ChangePasswordResponse {}

service UserService {
  rpc Register(RegisterRequest) returns (RegisterResponse);
  rpc Login(LoginRequest) returns (LoginResponse);
  rpc RefreshToken(RefreshTokenRequest) returns (RefreshTokenResponse);
  rpc Logout(LogoutRequest) returns (LogoutResponse);
  rpc RevokeAllTokens(RevokeAllTokensRequest) returns (RevokeAllTokensResponse);
  rpc GetUser(GetUserRequest) returns (GetUserResponse);
  rpc UpdateUser(UpdateUserRequest) returns (UpdateUserResponse);
  rpc SoftDeleteUser(SoftDeleteUserRequest) returns (SoftDeleteUserResponse);
  rpc SearchUsers(SearchUsersRequest) returns (SearchUsersResponse);
  rpc GetUsersByIDs(GetUsersByIDsRequest) returns (GetUsersByIDsResponse);
  rpc Follow(FollowRequest) returns (FollowResponse);
  rpc Unfollow(UnfollowRequest) returns (UnfollowResponse);
  rpc GetFollowers(GetFollowersRequest) returns (GetFollowersResponse);
  rpc GetFollowing(GetFollowingRequest) returns (GetFollowingResponse);
  rpc GetRecommendedUsers(GetRecommendedUsersRequest) returns (GetRecommendedUsersResponse);
  rpc CreateNotification(CreateNotificationRequest) returns (CreateNotificationResponse);
  rpc GetNotifications(GetNotificationsRequest) returns (GetNotificationsResponse);
  rpc GetUnreadCount(GetUnreadCountRequest) returns (GetUnreadCountResponse);
  rpc MarkRead(MarkReadRequest) returns (MarkReadResponse);
  rpc MarkAllRead(MarkAllReadRequest) returns (MarkAllReadResponse);
  rpc ChangePassword(ChangePasswordRequest) returns (ChangePasswordResponse);
  rpc ListUsers(ListUsersRequest) returns (ListUsersResponse);
  rpc SetAdmin(SetAdminRequest) returns (SetAdminResponse);
  rpc BanUser(BanUserRequest) returns (BanUserResponse);
}

// Admin: list all users
message ListUsersRequest {
  common.v1.PaginationRequest pagination = 1;
}

message ListUsersResponse {
  repeated User users = 1;
  common.v1.PaginationResponse pagination = 2;
  int32 total = 3;
}

// Admin: set admin status
message SetAdminRequest {
  string user_id = 1;
  bool is_admin = 2;
}

message SetAdminResponse {
  User user = 1;
}

// Admin: ban/unban user
message BanUserRequest {
  string user_id = 1;
  bool is_banned = 2;
}

message BanUserResponse {
  User user = 1;
}
