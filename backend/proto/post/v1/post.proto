syntax = "proto3";

package post.v1;

option go_package = "github.com/usedcvnt/microtwitter/gen/go/post/v1";

import "common/v1/common.proto";
import "google/protobuf/timestamp.proto";

message Post {
  string id = 1;
  string user_id = 2;
  string content = 3;
  string media_url = 4;
  int32 likes_count = 5;
  int32 comments_count = 6;
  google.protobuf.Timestamp created_at = 7;
  google.protobuf.Timestamp updated_at = 8;
  bool bookmarked = 9;
  google.protobuf.Timestamp edited_at = 10;
  repeated string hashtags = 11;
  int32 reposts_count = 12;
  bool reposted = 13;
  bool liked = 14;
}

message CreatePostRequest {
  string user_id = 1;
  string content = 2;
  string media_url = 3;
}

message CreatePostResponse {
  Post post = 1;
}

message GetPostRequest {
  string id = 1;
  string user_id = 2;
}

message GetPostResponse {
  Post post = 1;
}

message DeletePostRequest {
  string id = 1;
  string user_id = 2;
}

message DeletePostResponse {}

message GetFeedRequest {
  string user_id = 1;
  common.v1.PaginationRequest pagination = 2;
}

message GetFeedResponse {
  repeated Post posts = 1;
  common.v1.PaginationResponse pagination = 2;
}

message LikePostRequest {
  string user_id = 1;
  string post_id = 2;
}

message LikePostResponse {}

message UnlikePostRequest {
  string user_id = 1;
  string post_id = 2;
}

message UnlikePostResponse {}

message GetPostsByUserRequest {
  string user_id = 1;
  common.v1.PaginationRequest pagination = 2;
  string viewer_id = 3;
}

message GetPostsByUserResponse {
  repeated Post posts = 1;
  common.v1.PaginationResponse pagination = 2;
}

// Global feed (public, no auth required)
message GetGlobalFeedRequest {
  common.v1.PaginationRequest pagination = 1;
  string user_id = 2;
}

message GetGlobalFeedResponse {
  repeated Post posts = 1;
  common.v1.PaginationResponse pagination = 2;
}

// Bookmarks
message BookmarkPostRequest {
  string user_id = 1;
  string post_id = 2;
}

message BookmarkPostResponse {}

message UnbookmarkPostRequest {
  string user_id = 1;
  string post_id = 2;
}

message UnbookmarkPostResponse {}

message GetBookmarksRequest {
  string user_id = 1;
  common.v1.PaginationRequest pagination = 2;
}

message GetBookmarksResponse {
  repeated Post posts = 1;
  common.v1.PaginationResponse pagination = 2;
}

// Edit posts
message UpdatePostRequest {
  string id = 1;
  string user_id = 2;
  string content = 3;
  string media_url = 4;
}

message UpdatePostResponse {
  Post post = 1;
}

// Hashtags
message TrendingHashtag {
  string tag = 1;
  int32 post_count = 2;
}

message GetPostsByHashtagRequest {
  string tag = 1;
  common.v1.PaginationRequest pagination = 2;
  string user_id = 3;
}

message GetPostsByHashtagResponse {
  repeated Post posts = 1;
  common.v1.PaginationResponse pagination = 2;
}

message GetTrendingHashtagsRequest {
  int32 limit = 1;
}

message GetTrendingHashtagsResponse {
  repeated TrendingHashtag hashtags = 1;
}

// Reposts
message Repost {
  string id = 1;
  string user_id = 2;
  string post_id = 3;
  string quote_content = 4;
  string type = 5;
  google.protobuf.Timestamp created_at = 6;
}

message RepostPostRequest {
  string user_id = 1;
  string post_id = 2;
}

message RepostPostResponse {}

message UnrepostPostRequest {
  string user_id = 1;
  string post_id = 2;
}

message UnrepostPostResponse {}

message QuotePostRequest {
  string user_id = 1;
  string post_id = 2;
  string content = 3;
}

message QuotePostResponse {
  Post post = 1;
}

message GetRepostsByUserRequest {
  string user_id = 1;
  common.v1.PaginationRequest pagination = 2;
  string viewer_id = 3;
}

message GetRepostsByUserResponse {
  repeated Post posts = 1;
  common.v1.PaginationResponse pagination = 2;
}

service PostService {
  rpc CreatePost(CreatePostRequest) returns (CreatePostResponse);
  rpc GetPost(GetPostRequest) returns (GetPostResponse);
  rpc DeletePost(DeletePostRequest) returns (DeletePostResponse);
  rpc GetFeed(GetFeedRequest) returns (GetFeedResponse);
  rpc GetGlobalFeed(GetGlobalFeedRequest) returns (GetGlobalFeedResponse);
  rpc LikePost(LikePostRequest) returns (LikePostResponse);
  rpc UnlikePost(UnlikePostRequest) returns (UnlikePostResponse);
  rpc GetPostsByUser(GetPostsByUserRequest) returns (GetPostsByUserResponse);
  rpc BookmarkPost(BookmarkPostRequest) returns (BookmarkPostResponse);
  rpc UnbookmarkPost(UnbookmarkPostRequest) returns (UnbookmarkPostResponse);
  rpc GetBookmarks(GetBookmarksRequest) returns (GetBookmarksResponse);
  rpc UpdatePost(UpdatePostRequest) returns (UpdatePostResponse);
  rpc GetPostsByHashtag(GetPostsByHashtagRequest) returns (GetPostsByHashtagResponse);
  rpc GetTrendingHashtags(GetTrendingHashtagsRequest) returns (GetTrendingHashtagsResponse);
  rpc RepostPost(RepostPostRequest) returns (RepostPostResponse);
  rpc UnrepostPost(UnrepostPostRequest) returns (UnrepostPostResponse);
  rpc QuotePost(QuotePostRequest) returns (QuotePostResponse);
  rpc GetRepostsByUser(GetRepostsByUserRequest) returns (GetRepostsByUserResponse);
}
